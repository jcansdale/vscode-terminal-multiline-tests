name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        vscode-version: [stable, insiders]
    name: ${{ matrix.os }} / VS Code ${{ matrix.vscode-version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Install shells
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y zsh dash
      - name: Install bash
        if: runner.os == 'macOS'
        run: brew install bash
      - name: Resolve bash path
        if: runner.os == 'macOS'
        id: bash-path
        run: echo "path=$(brew --prefix bash)/bin/bash" >> "$GITHUB_OUTPUT"
      - name: Run tests (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a npm test
        env:
          VSCODE_VERSION: ${{ matrix.vscode-version }}
          TEST_RESULTS_PATH: ${{ runner.temp }}/test-results.json
      - name: Run tests (macOS)
        if: runner.os == 'macOS'
        run: npm test
        env:
          BASH_PATH: ${{ steps.bash-path.outputs.path }}
          VSCODE_VERSION: ${{ matrix.vscode-version }}
          TEST_RESULTS_PATH: ${{ runner.temp }}/test-results.json
      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        run: npm test
        env:
          VSCODE_VERSION: ${{ matrix.vscode-version }}
          TEST_RESULTS_PATH: ${{ runner.temp }}/test-results.json
      - name: Test summary
        if: always()
        run: node .github/scripts/test-summary.js
        env:
          TEST_RESULTS_PATH: ${{ runner.temp }}/test-results.json

  test-vscode-pr:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    name: ${{ matrix.os }} / VS Code PR #302526
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci

      - name: Install shells
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y zsh dash

      - name: Install bash
        if: runner.os == 'macOS'
        run: brew install bash

      - name: Resolve bash path
        if: runner.os == 'macOS'
        id: bash-path
        run: echo "path=$(brew --prefix bash)/bin/bash" >> "$GITHUB_OUTPUT"

      - name: Install native module build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get install -y pkg-config libxkbfile-dev libkrb5-dev libgbm1

      - name: Enable long paths (Windows)
        if: runner.os == 'Windows'
        run: git config --system core.longpaths true

      - name: Checkout VS Code PR
        uses: actions/checkout@v4
        with:
          repository: microsoft/vscode
          ref: refs/pull/302526/head
          path: vscode-src

      - name: Setup Node.js for VS Code build
        uses: actions/setup-node@v4
        with:
          node-version-file: vscode-src/.nvmrc

      - name: Install VS Code dependencies (Unix)
        if: runner.os != 'Windows'
        working-directory: vscode-src
        run: |
          for i in {1..5}; do
            npm ci && break
            if [ $i -eq 5 ]; then
              echo "npm ci failed too many times" >&2
              exit 1
            fi
            echo "npm ci failed $i, trying again..."
          done
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install VS Code dependencies (Windows)
        if: runner.os == 'Windows'
        working-directory: vscode-src
        shell: pwsh
        run: |
          $maxRetries = 5
          for ($i = 1; $i -le $maxRetries; $i++) {
            npm ci
            if ($LASTEXITCODE -eq 0) { break }
            if ($i -eq $maxRetries) {
              Write-Error "npm ci failed too many times"
              exit 1
            }
            Write-Host "npm ci failed $i, trying again..."
          }
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compile VS Code
        working-directory: vscode-src
        run: npm run compile

      - name: Download Electron
        working-directory: vscode-src
        run: npm run electron
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Find Electron binary (Unix)
        if: runner.os != 'Windows'
        id: electron
        run: |
          # Read product.json for the correct binary names
          cd "$GITHUB_WORKSPACE/vscode-src"
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            NAME_LONG=$(node -p "require('./product.json').nameLong")
            NAME_SHORT=$(node -p "require('./product.json').nameShort")
            ELECTRON_PATH="$GITHUB_WORKSPACE/vscode-src/.build/electron/$NAME_LONG.app/Contents/MacOS/$NAME_SHORT"
          else
            APP_NAME=$(node -p "require('./product.json').applicationName")
            ELECTRON_PATH="$GITHUB_WORKSPACE/vscode-src/.build/electron/$APP_NAME"
          fi
          echo "Electron path: $ELECTRON_PATH"
          echo "path=$ELECTRON_PATH" >> "$GITHUB_OUTPUT"
          ls -la "$ELECTRON_PATH" || echo "WARNING: Electron binary not found at expected path"

      - name: Find Electron binary (Windows)
        if: runner.os == 'Windows'
        id: electron-win
        shell: pwsh
        run: |
          Set-Location (Join-Path $env:GITHUB_WORKSPACE "vscode-src")
          $appName = node -p "require('./product.json').applicationName"
          $electronDir = Join-Path $env:GITHUB_WORKSPACE "vscode-src" ".build" "electron"
          Write-Host "Electron directory contents:"
          Get-ChildItem $electronDir -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "  $_" }
          $electronPath = Join-Path $electronDir "$appName.exe"
          Write-Host "Electron path: $electronPath"
          echo "path=$electronPath" >> $env:GITHUB_OUTPUT
          if (Test-Path $electronPath) { Get-Item $electronPath } else { Write-Host "WARNING: Electron binary not found at expected path" }

      - name: Run tests (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a npm test
        env:
          VSCODE_PATH: ${{ steps.electron.outputs.path }}
          VSCODE_SOURCE_DIR: ${{ github.workspace }}/vscode-src
          TEST_RESULTS_PATH: ${{ runner.temp }}/test-results.json

      - name: Run tests (macOS)
        if: runner.os == 'macOS'
        run: npm test
        env:
          BASH_PATH: ${{ steps.bash-path.outputs.path }}
          VSCODE_PATH: ${{ steps.electron.outputs.path }}
          VSCODE_SOURCE_DIR: ${{ github.workspace }}/vscode-src
          TEST_RESULTS_PATH: ${{ runner.temp }}/test-results.json

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        run: npm test
        env:
          VSCODE_PATH: ${{ steps.electron-win.outputs.path }}
          VSCODE_SOURCE_DIR: ${{ github.workspace }}/vscode-src
          TEST_RESULTS_PATH: ${{ runner.temp }}/test-results.json

      - name: Test summary
        if: always()
        run: node .github/scripts/test-summary.js
        env:
          TEST_RESULTS_PATH: ${{ runner.temp }}/test-results.json
