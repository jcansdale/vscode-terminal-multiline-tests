name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    permissions:
      checks: write
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        vscode-version: [stable, insiders]
    name: ${{ matrix.os }} / VS Code ${{ matrix.vscode-version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Install shells
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y zsh dash
      - name: Run tests (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a npm test
        env:
          VSCODE_VERSION: ${{ matrix.vscode-version }}
      - name: Run tests (macOS)
        if: runner.os == 'macOS'
        run: npm test
        env:
          VSCODE_VERSION: ${{ matrix.vscode-version }}
      - name: Report test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results (${{ matrix.os }} / VS Code ${{ matrix.vscode-version }})
          path: test-results.xml
          reporter: java-junit
          fail-on-error: false
