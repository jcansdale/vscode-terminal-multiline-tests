name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        vscode-version: [stable, insiders]
    name: ${{ matrix.os }} / VS Code ${{ matrix.vscode-version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Install shells
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y zsh dash
      - name: Run tests (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a npm test
        env:
          VSCODE_VERSION: ${{ matrix.vscode-version }}
      - name: Run tests (macOS)
        if: runner.os == 'macOS'
        run: npm test
        env:
          VSCODE_VERSION: ${{ matrix.vscode-version }}

  test-vscode-pr:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    name: ${{ matrix.os }} / VS Code PR #302526
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci

      - name: Install shells
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y zsh dash

      - name: Install native module build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get install -y pkg-config libxkbfile-dev libkrb5-dev libgbm1

      - name: Checkout VS Code PR
        uses: actions/checkout@v4
        with:
          repository: microsoft/vscode
          ref: refs/pull/302526/head
          path: vscode-src

      - name: Setup Node.js for VS Code build
        uses: actions/setup-node@v4
        with:
          node-version-file: vscode-src/.nvmrc

      - name: Install VS Code dependencies
        working-directory: vscode-src
        run: |
          for i in {1..5}; do
            npm ci && break
            if [ $i -eq 5 ]; then
              echo "npm ci failed too many times" >&2
              exit 1
            fi
            echo "npm ci failed $i, trying again..."
          done
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compile VS Code
        working-directory: vscode-src
        run: npm run compile

      - name: Download Electron
        working-directory: vscode-src
        run: npm run electron
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Find Electron binary
        id: electron
        run: |
          echo "Contents of .build/electron/:"
          ls -la "$GITHUB_WORKSPACE/vscode-src/.build/electron/" 2>/dev/null || echo "Directory does not exist"
          echo "---"
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            # Find the actual .app bundle
            APP_PATH=$(find "$GITHUB_WORKSPACE/vscode-src/.build/electron" -name "*.app" -maxdepth 1 2>/dev/null | head -1)
            if [[ -n "$APP_PATH" ]]; then
              echo "Found app bundle: $APP_PATH"
              echo "Contents/MacOS/:"
              ls -la "$APP_PATH/Contents/MacOS/" 2>/dev/null || echo "MacOS dir missing"
              # Find the actual executable
              ELECTRON_PATH=$(find "$APP_PATH/Contents/MacOS" -type f -perm +111 2>/dev/null | head -1)
              if [[ -z "$ELECTRON_PATH" ]]; then
                echo "No executable found in MacOS dir, trying Electron name"
                ELECTRON_PATH="$APP_PATH/Contents/MacOS/Electron"
              fi
            else
              echo "No .app bundle found, listing .build/electron recursively:"
              find "$GITHUB_WORKSPACE/vscode-src/.build/electron" -type f 2>/dev/null | head -20
              ELECTRON_PATH="$GITHUB_WORKSPACE/vscode-src/.build/electron/Code - OSS.app/Contents/MacOS/Electron"
            fi
          else
            ELECTRON_PATH="$GITHUB_WORKSPACE/vscode-src/.build/electron/code-oss"
          fi
          echo "Electron path: $ELECTRON_PATH"
          echo "path=$ELECTRON_PATH" >> "$GITHUB_OUTPUT"
          ls -la "$ELECTRON_PATH" || echo "WARNING: Electron binary not found at expected path"

      - name: Run tests (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a npm test
        env:
          VSCODE_PATH: ${{ steps.electron.outputs.path }}
          VSCODE_SOURCE_DIR: ${{ github.workspace }}/vscode-src

      - name: Run tests (macOS)
        if: runner.os == 'macOS'
        run: npm test
        env:
          VSCODE_PATH: ${{ steps.electron.outputs.path }}
          VSCODE_SOURCE_DIR: ${{ github.workspace }}/vscode-src
